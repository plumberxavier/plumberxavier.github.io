<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 480" fill="none" role="img" aria-label="Illustration of a faucet with dripping water over a basin">
  <!-- soft backdrop -->
  <circle cx="292" cy="252" r="196" fill="#cc785c" opacity="0.07"/>
  <circle cx="292" cy="252" r="140" fill="#cc785c" opacity="0.05"/>

  <!-- wall mount flange -->
  <rect x="46" y="160" width="26" height="58" rx="7" fill="#cc785c" opacity="0.18"/>
  <rect x="46" y="160" width="26" height="58" rx="7" stroke="#181715" stroke-width="6"/>

  <!-- faucet body: from wall, across, curve down to spout -->
  <path d="M72 189 H250 Q304 189 304 236 V298" stroke="#181715" stroke-width="22" stroke-linecap="round"/>
  <!-- subtle highlight on pipe -->
  <path d="M86 181 H236" stroke="#faf9f5" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- riser + valve wheel -->
  <path d="M250 189 V140" stroke="#181715" stroke-width="22" stroke-linecap="round"/>
  <circle cx="250" cy="120" r="30" stroke="#cc785c" stroke-width="11"/>
  <path d="M250 96 V144 M226 120 H274" stroke="#cc785c" stroke-width="9" stroke-linecap="round"/>

  <!-- spout nozzle -->
  <path d="M291 296 H317 L311 314 H297 Z" fill="#181715"/>

  <!-- water drops -->
  <path d="M304 332c0 0-8 9-8 14a8 8 0 0 0 16 0c0-5-8-14-8-14Z" fill="#cc785c"/>
  <path d="M300 372c0 0-6 7-6 11a6 6 0 0 0 12 0c0-4-6-11-6-11Z" fill="#cc785c" opacity="0.8"/>

  <!-- basin -->
  <path d="M232 408 Q304 452 376 408" stroke="#181715" stroke-width="7" stroke-linecap="round"/>
  <path d="M250 406 H358" stroke="#cc785c" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

  <!-- decorative droplets, right -->
  <path d="M408 200c0 0-7 8-7 12a7 7 0 0 0 14 0c0-4-7-12-7-12Z" fill="#cc785c" opacity="0.55"/>
  <path d="M392 256c0 0-5 6-5 9a5 5 0 0 0 10 0c0-3-5-9-5-9Z" fill="#181715" opacity="0.5"/>
</svg>
