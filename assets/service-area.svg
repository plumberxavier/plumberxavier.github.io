<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 440" fill="none" role="img" aria-label="Map of the Fort Lauderdale service area">
  <!-- map card -->
  <rect x="20" y="20" width="480" height="400" rx="20" fill="#faf9f5" stroke="#e6dfd8" stroke-width="2"/>

  <!-- street grid -->
  <g stroke="#181715" stroke-width="2" opacity="0.18" stroke-linecap="round">
    <path d="M20 130 H500"/>
    <path d="M20 230 H500"/>
    <path d="M20 330 H500"/>
    <path d="M150 20 V420"/>
    <path d="M300 20 V420"/>
  </g>

  <!-- coastline (ocean to the east) -->
  <path d="M430 20 q-26 70 4 150 q26 70 -10 150 q-14 56 14 100" stroke="#cc785c" stroke-width="3" opacity="0.45" stroke-linecap="round"/>
  <g stroke="#cc785c" stroke-width="2.5" opacity="0.35" stroke-linecap="round">
    <path d="M452 90 q10 8 20 0"/>
    <path d="M452 170 q10 8 20 0"/>
    <path d="M448 250 q10 8 20 0"/>
    <path d="M452 330 q10 8 20 0"/>
  </g>

  <!-- highlighted route -->
  <path d="M52 392 Q210 250 470 70" stroke="#cc785c" stroke-width="3.5" stroke-dasharray="2 11" stroke-linecap="round"/>

  <!-- a few neighborhood blocks -->
  <g stroke="#181715" stroke-width="2" opacity="0.22">
    <rect x="60" y="60" width="46" height="34" rx="5"/>
    <rect x="196" y="270" width="50" height="38" rx="5"/>
    <rect x="330" y="150" width="44" height="34" rx="5"/>
  </g>

  <!-- location pin (Fort Lauderdale) -->
  <ellipse cx="240" cy="300" rx="32" ry="9" fill="#181715" opacity="0.12"/>
  <path d="M240 150a52 52 0 0 1 52 52c0 38-52 94-52 94s-52-56-52-94a52 52 0 0 1 52-52Z" fill="#cc785c"/>
  <circle cx="240" cy="202" r="20" fill="#faf9f5"/>
</svg>
